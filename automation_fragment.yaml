- id: '1764904877375'
  alias: forecats
  description: "Calls a Python script to get a cat picture after checking the weather."
  triggers:
  - trigger: time
    at: "05:00:00"
  conditions: []
  actions:
  - action: weather.get_forecasts
      metadata: {}
      data:
        type: daily
      target:
        entity_id: weather.forecast_home
      response_variable: todays_forecast
    - action: python_script.forecats
      data:
        api_key: !secret GEMINI_API_KEY
        input_image_paths:
          - "./inputs/milo_and_tolmie.jpg"
          - "./inputs/milo_and_tolmie2.jpg"
          - "./inputs/milo.jpg"
          - "./inputs/tolmie.jpg"
          - "./inputs/tolmie2.jpg"
        output_image_dir: "./www"
        location: "Toronto, Ontario, Canada"
        forecast: "{{ todays_forecast.forecast[0] }}"
        cat_names:
          - "Milo"
          - "Tolmie"
        cat_descriptions:
          - "Milo is a domestic short-haired tabby. He is seven years old and we like to imagine that he is serious but a little goofy on the outside. He has green eyes. He loves cuddling, sitting on his mom's lap, his little brother Tolmie, holding pom-pom toys in his mouth, and stealing kibbles from his brother. You can just *barely* see a little bit of his pink skin beneath his tummy fur, but it is cute and fuzzy with some paunch."
          - "Tolmie is a blue sealpoint ragdoll, his blue eyes are just a little crosseyed. We like to imagine that he is pretty goofy. He loves his big brother Milo, playing with strings, rolling on the ground (belly up), and sprinting full speed around the house yelling. He is all fluff."
        art_styles:
          - "comic book"
          - "anime"
          - "pixar"
          - "watercolor"
          - "ghibli"
          - "disney"
          - "scavengers reign style"
          - "Traditional 2D Animation Style"
          - "Cel Animation Style"
          - "Stop-Motion Animation Style"
          - "Claymation Style"
          - "Puppetoon Style"
          - "Jean Giraud/Moebius Style"
          - "Banksy Style"
          - "Vintage Cartoon Style"
          - "Cutout Animation Style"
          - "3D/CGI Animation Style"
          - "Pixar Style"
          - "Stylized 3D Animation Style"
          - "Motion Graphics Animation Style"
          - "Rotoscoping Style"
          - "Limited Animation Style"
          - "Full Animation Style"
          - "Anime Style"
          - "Chibi Style"
          - "Ghibli Style"
          - "Rubber Hose Animation Style"
          - "Fleischer Style"
          - "Looney Tunes Style"
          - "U.P.A. (United Productions of America) Style"
          - "South Park Style"
          - "The Simpsons Style"
          - "Adult Swim Style"
          - "Abstract Animation Style"
          - "Pin Screen Animation Style"
          - "Sand Animation Style"
          - "Watercolor Animation Style"
          - "Line Drawing Animation Style"
          - "Splatterscreen/Hanna-Barbera Style"
          - "Experimental Animation Style"
        image_gen_aspect_ratio: "16:9"
        image_gen_resolution: "1K"
        final_aspect_ratio: "5:3"
        final_resolution: "800x480"
  mode: single
